name: Extension PR CI

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/extension-pr-ci.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  extension-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24, 25]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Verify Python
        run: |
          which python
          python --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupyterlab

      - name: Build Extension
        run: |
          which python
          python -m jupyter labextension build .

      - name: Run Tests
        if: always()
        run: npm test 2>&1 | tee tests/test-results.tap

      - name: Publish Job Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const tapPath = 'tests/test-results.tap';
            const tap = fs.existsSync(tapPath) ? fs.readFileSync(tapPath, 'utf8') : '';
            const lines = tap.split(/\r?\n/);
            const passed = [];
            const failed = [];

            for (const line of lines) {
              if (line.startsWith('ok ')) {
                passed.push(line.replace(/^ok\s+\d+\s*-\s*/, '').trim());
              } else if (line.startsWith('not ok ')) {
                failed.push(line.replace(/^not ok\s+\d+\s*-\s*/, '').trim());
              }
            }

            const summary = [
              '## Extension CI Summary',
              '',
              '| Metric | Value |',
              '|---|---:|',
              `| Total tests | ${passed.length + failed.length} |`,
              `| Passed | ${passed.length} |`,
              `| Failed | ${failed.length} |`,
              '',
            ];

            if (failed.length > 0) {
              summary.push('### Failed Tests', '');
              for (const name of failed) {
                summary.push(`- ${name}`);
              }
              summary.push('');
            }

            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${summary.join('\n')}\n`);

      - name: Upload Extension Test Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extension-pr-ci-artifacts
          path: tests/test-results.tap
          if-no-files-found: warn